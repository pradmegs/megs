backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "home"
        file: "index.html"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            default: "For All Your Visualizations"

          - label: "Hero Description"
            name: "hero_description"
            widget: "text"

          - label: "About Section"
            name: "about_text"
            widget: "markdown"

          - label: "Pricing & Process"
            name: "pricing_text"
            widget: "markdown"

      - label: "Portfolio Page"
        name: "portfolio"
        file: "portfolio.html"
        fields:
          - label: "Page Title"
            name: "page_title"
            widget: "string"